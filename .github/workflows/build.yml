name: CI Build

on:
  push:
    branches: [ master, dev ]
    tags: [ 'Release-*' ]
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:
    inputs:
      os:
        description: 'Limit to one OS (leave as "all" to run the full matrix)'
        type: choice
        default: 'all'
        options: [ all, ubuntu-latest, windows-latest ]
      build_type:
        description: 'Limit to one build type (leave as "all" to run both)'
        type: choice
        default: 'all'
        options: [ all, Release, Debug ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  compute-matrix:
    # Computes the actual matrix to run. On push/PR (or workflow_dispatch with
    # inputs left as "all"), this is the full 3-OS x 2-build_type cross
    # product, same as before. On workflow_dispatch with a specific os/
    # build_type chosen, it's narrowed to just that combination - job-level
    # `if:` conditions can't reference `matrix.*` to filter legs after the
    # fact, so the matrix itself has to be built with only what's wanted.
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
    - id: set
      shell: bash
      env:
        INPUT_OS: ${{ github.event.inputs.os || 'all' }}
        INPUT_BUILD_TYPE: ${{ github.event.inputs.build_type || 'all' }}
      run: |
        python3 - <<'PYEOF' >> "$GITHUB_OUTPUT"
        import json, os

        os_input = os.environ["INPUT_OS"]
        bt_input = os.environ["INPUT_BUILD_TYPE"]

        # macos-latest dropped: Apple deprecated OpenGL (this app's rendering
        # backend) with no further investment, so macOS CI coverage isn't
        # worth the vcpkg/toolchain flakiness it kept hitting.
        all_os = [
            {"os": "ubuntu-latest", "triplet": "x64-linux", "mono": "mono"},
            {"os": "windows-latest", "triplet": "x64-windows", "mono": ""},
        ]
        all_build_types = ["Release", "Debug"]

        oses = all_os if os_input == "all" else [o for o in all_os if o["os"] == os_input]
        build_types = all_build_types if bt_input == "all" else [bt_input]

        matrix = [dict(o, build_type=bt) for o in oses for bt in build_types]

        print(f"matrix={json.dumps(matrix)}")
        PYEOF

  build:
    needs: compute-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.compute-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          curl \
          zip \
          unzip \
          tar \
          git \
          gcc \
          g++ \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libegl1-mesa-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libopengl-dev \
          libxmu-dev \
          libtbb-dev \
          libtcl8.6 \
          libtk8.6 \
          tcl8.6-dev \
          tk8.6-dev \
          autoconf \
          automake \
          libtool \
          imagemagick

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Ninja (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja -y --no-progress

    - name: Setup environment for vcpkg
      run: |
        echo "VCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg/triplets" >> $GITHUB_ENV
        echo "VCPKG_DEFAULT_TRIPLET=${{ matrix.triplet }}" >> $GITHUB_ENV

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'dd3097e305afa53f7b4312371f62058d2e665320'
        runVcpkgInstall: false

    - name: Install vcpkg dependencies
      run: |
        ${{ github.workspace }}/vcpkg/vcpkg install --triplet=${{ matrix.triplet }} --x-manifest-root=. --x-install-root=./build/vcpkg_installed

    - name: Create required directories (Windows)
      if: runner.os == 'Windows'
      run: |
        New-Item -ItemType Directory -Force -Path translations, ui, include, src

    - name: Create required directories (Unix)
      if: runner.os != 'Windows'
      run: |
        mkdir -p translations ui include src

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} -DCMAKE_INSTALL_PREFIX=install -G Ninja

    - name: Configure CMake (Unix)
      if: runner.os != 'Windows'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
          -DCMAKE_INSTALL_PREFIX=install \
          -G Ninja

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Update translations (optional)
      run: cmake --build build --target update_translations --config ${{ matrix.build_type }}
      continue-on-error: true

    - name: Test
      working-directory: build
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --parallel

    - name: Install
      run: cmake --install build --prefix install --config ${{ matrix.build_type }}

    - name: Package artifacts (Windows)
      if: runner.os == 'Windows' && matrix.build_type == 'Release'
      run: |
        cmake --build build --target install --config ${{ matrix.build_type }}
        # Qt deployment script will be run automatically during install

    - name: Build Windows installer (Inno Setup)
      if: runner.os == 'Windows' && matrix.build_type == 'Release' && (startsWith(github.ref, 'refs/tags/Release-') || github.event_name == 'workflow_dispatch')
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
          /DMyAppInstallDir="${{ github.workspace }}\install" `
          "${{ github.workspace }}\packaging\windows\mvinstaller.iss"

    - name: Upload Windows installer
      if: runner.os == 'Windows' && matrix.build_type == 'Release' && (startsWith(github.ref, 'refs/tags/Release-') || github.event_name == 'workflow_dispatch')
      uses: actions/upload-artifact@v4
      with:
        name: modelviewer-windows-installer
        path: dist/*.exe
        retention-days: 30

    - name: Build Linux AppImage
      if: runner.os == 'Linux' && matrix.build_type == 'Release' && (startsWith(github.ref, 'refs/tags/Release-') || github.event_name == 'workflow_dispatch')
      run: |
        set -e

        # --- Locate qmake from the vcpkg-built Qt6, so linuxdeploy-plugin-qt
        # can find Qt's plugins/translations/lib dir to bundle. ---
        QMAKE_PATH=$(find "${{ github.workspace }}/build/vcpkg_installed" -maxdepth 4 -type f -name qmake6 | head -n1)
        if [ -z "$QMAKE_PATH" ]; then
          QMAKE_PATH=$(find "${{ github.workspace }}/build/vcpkg_installed" -maxdepth 4 -type f -name qmake | head -n1)
        fi
        echo "Using qmake: $QMAKE_PATH"
        export QMAKE="$QMAKE_PATH"

        # --- Assemble an AppDir from the CMake install output. ---
        APPDIR="${{ github.workspace }}/AppDir"
        mkdir -p "$APPDIR/usr"
        cp -r "${{ github.workspace }}/install/"* "$APPDIR/usr/"

        # Convert the existing 42x42 .ico to a PNG for the AppImage/.desktop icon.
        mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
        convert "${{ github.workspace }}/res/ModelViewer.ico[0]" \
          "$APPDIR/usr/share/icons/hicolor/256x256/apps/modelviewer.png"

        # --- Download linuxdeploy, its Qt plugin, and appimagetool, then
        # pre-extract each (--appimage-extract) so none of them need FUSE to
        # run on the CI runner. Extracted AppRun entrypoints are exposed on
        # PATH under the exact names linuxdeploy's plugin discovery expects. ---
        TOOLS_DIR="${{ github.workspace }}/appimage-tools"
        mkdir -p "$TOOLS_DIR"
        cd "$TOOLS_DIR"

        curl -L -o linuxdeploy-x86_64.AppImage \
          https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        curl -L -o linuxdeploy-plugin-qt-x86_64.AppImage \
          https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        curl -L -o appimagetool-x86_64.AppImage \
          https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x ./*.AppImage

        ./linuxdeploy-x86_64.AppImage --appimage-extract >/dev/null
        mv squashfs-root linuxdeploy-extracted

        ./linuxdeploy-plugin-qt-x86_64.AppImage --appimage-extract >/dev/null
        mv squashfs-root linuxdeploy-plugin-qt-extracted
        ln -s "$TOOLS_DIR/linuxdeploy-plugin-qt-extracted/AppRun" \
              "$TOOLS_DIR/linuxdeploy-plugin-qt-extracted/linuxdeploy-plugin-qt"

        ./appimagetool-x86_64.AppImage --appimage-extract >/dev/null
        mv squashfs-root appimagetool-extracted
        ln -s "$TOOLS_DIR/appimagetool-extracted/AppRun" \
              "$TOOLS_DIR/appimagetool-extracted/appimagetool"

        export PATH="$TOOLS_DIR/linuxdeploy-plugin-qt-extracted:$TOOLS_DIR/appimagetool-extracted:$PATH"

        mkdir -p "${{ github.workspace }}/dist"
        cd "${{ github.workspace }}/dist"
        "$TOOLS_DIR/linuxdeploy-extracted/AppRun" \
          --appdir "$APPDIR" \
          --executable "$APPDIR/usr/bin/ModelViewer" \
          --desktop-file "${{ github.workspace }}/ModelViewer.desktop" \
          --icon-file "$APPDIR/usr/share/icons/hicolor/256x256/apps/modelviewer.png" \
          --plugin qt \
          --output appimage

    - name: Upload Linux AppImage
      if: runner.os == 'Linux' && matrix.build_type == 'Release' && (startsWith(github.ref, 'refs/tags/Release-') || github.event_name == 'workflow_dispatch')
      uses: actions/upload-artifact@v4
      with:
        name: modelviewer-linux-appimage
        path: dist/*.AppImage
        retention-days: 30

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: modelviewer-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          install/
          !install/**/*.pdb
          build/translations/*.qm
        retention-days: 30

    - name: Upload translation files
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: translations-${{ matrix.os }}
        path: |
          translations/*.ts
          build/translations/*.qm
        retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/Release-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Windows installer
      uses: actions/download-artifact@v4
      with:
        name: modelviewer-windows-installer
        path: release-assets

    - name: Download Linux AppImage
      uses: actions/download-artifact@v4
      with:
        name: modelviewer-linux-appimage
        path: release-assets

    - name: Create/update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: CHANGELOG.md
        files: release-assets/*