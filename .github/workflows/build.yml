name: CI Build

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            triplet: x64-linux
            mono: mono
          - os: windows-latest
            triplet: x64-windows
            mono: ""
          - os: macos-latest
            triplet: x64-osx
            mono: mono

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          curl \
          zip \
          unzip \
          tar \
          git \
          gcc \
          g++ \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libegl1-mesa-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libopengl-dev \
          libxmu-dev \
          libtbb-dev \
          libtcl8.6 \
          libtk8.6 \
          tcl8.6-dev \
          tk8.6-dev \
          autoconf \
          automake \
          libtool

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja pkg-config autoconf automake libtool

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup environment for vcpkg
      run: |
        echo "VCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg/triplets" >> $GITHUB_ENV
        echo "VCPKG_DEFAULT_TRIPLET=${{ matrix.triplet }}" >> $GITHUB_ENV

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'dd3097e305afa53f7b4312371f62058d2e665320'
        runVcpkgInstall: false

    - name: Install vcpkg dependencies
      run: |
        ${{ github.workspace }}/vcpkg/vcpkg install --triplet=${{ matrix.triplet }} --x-manifest-root=. --x-install-root=./build/vcpkg_installed

    - name: Create required directories (Windows)
      if: runner.os == 'Windows'
      run: |
        New-Item -ItemType Directory -Force -Path translations, ui, include, src

    - name: Create required directories (Unix)
      if: runner.os != 'Windows'
      run: |
        mkdir -p translations ui include src

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} -DCMAKE_INSTALL_PREFIX=install -G "Visual Studio 17 2022" -A x64

    - name: Configure CMake (Unix)
      if: runner.os != 'Windows'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
          -DCMAKE_INSTALL_PREFIX=install \
          -G Ninja

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Update translations (optional)
      run: cmake --build build --target update_translations --config ${{ matrix.build_type }}
      continue-on-error: true

    - name: Test
      working-directory: build
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --parallel

    - name: Install
      run: cmake --install build --prefix install --config ${{ matrix.build_type }}

    - name: Package artifacts (Windows)
      if: runner.os == 'Windows' && matrix.build_type == 'Release'
      run: |
        cmake --build build --target install --config ${{ matrix.build_type }}
        # Qt deployment script will be run automatically during install

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: modelviewer-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          install/
          !install/**/*.pdb
          build/translations/*.qm
        retention-days: 30

    - name: Upload translation files
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: translations-${{ matrix.os }}
        path: |
          translations/*.ts
          build/translations/*.qm
        retention-days: 30