name: Build Project

on:
  push:
    branches:
      - master
  pull_request:

env:
  VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/.github/vcpkg_overlays/qt

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # ensure submodule baseline commit is available

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y libfontconfig1-dev ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.2
          cache: true

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: "ninja_release_vcpkg"
          buildPreset: "ninja_release_vcpkg_build"
